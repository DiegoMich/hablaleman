<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HablAleman 🇩🇪</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #a8c8f8 0%, #c4a8f8 50%, #f8a8d4 100%);
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    header h1 {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 12px rgba(80, 40, 160, 0.3);
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.5rem;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 1px 6px rgba(80, 40, 160, 0.2);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      max-width: 960px;
      margin: 0 auto 2rem;
    }

    .phrase-counter {
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 0.45rem 1.1rem;
    }

    .phrase-counter span {
      color: #fff;
    }

    .btn-clear {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,255,255,0.25);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50px;
      padding: 0.45rem 1.2rem;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn-clear:hover {
      background: rgba(255,255,255,0.38);
      transform: scale(1.04);
    }

    .btn-clear:active {
      transform: scale(0.97);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 1.5rem 1.6rem;
      box-shadow: 0 8px 30px rgba(100, 60, 200, 0.15);
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 40px rgba(100, 60, 200, 0.22);
    }

    /* Card number badge */
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-num {
      font-size: 0.75rem;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #c4a8f8, #a8c8f8);
      border-radius: 50px;
      padding: 0.15rem 0.55rem;
      min-width: 1.7rem;
      text-align: center;
    }

    /* Inputs */
    .input-de {
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: #2d1b6e;
      border: 2.5px solid #e8e0ff;
      border-radius: 14px;
      padding: 0.55rem 0.85rem;
      background: #f7f4ff;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      line-height: 1.4;
    }

    .input-de::placeholder {
      color: #c0b0e8;
      font-weight: 600;
    }

    .input-de:focus {
      border-color: #a078e8;
      box-shadow: 0 0 0 3px rgba(160, 120, 232, 0.18);
      background: #fff;
    }

    .input-es {
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #888;
      font-style: italic;
      border: 2px solid #f0eeee;
      border-radius: 12px;
      padding: 0.45rem 0.8rem;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .input-es::placeholder {
      color: #ccc;
      font-style: italic;
    }

    .input-es:focus {
      border-color: #f0b8d8;
      background: #fff;
    }

    .input-es[readonly] {
      cursor: default;
    }

    /* Button row */
    .btn-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    /* Speak button */
    .btn-speak {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #ffb347, #ff7c2a);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      padding: 0.55rem 1.3rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255, 140, 0, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      align-self: flex-start;
      position: relative;
      overflow: hidden;
    }

    .btn-speak:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 140, 0, 0.5);
    }

    .btn-speak:active {
      transform: scale(0.96);
    }

    .btn-speak:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-speak.speaking {
      background: linear-gradient(135deg, #7ed8f6, #3ab3e8);
      box-shadow: 0 4px 14px rgba(50, 150, 220, 0.45);
    }

    .btn-speak::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0);
      opacity: 0;
    }

    .btn-speak.speaking::after {
      animation: ripple 0.7s ease-out infinite;
    }

    @keyframes ripple {
      0%   { transform: scale(0.6); opacity: 0.6; }
      100% { transform: scale(2);   opacity: 0; }
    }

    .icon-wave {
      font-size: 1.1rem;
      display: inline-block;
    }

    .btn-speak.speaking .icon-wave {
      animation: bounce 0.5s ease infinite alternate;
    }

    .btn-slow {
      background: linear-gradient(135deg, #b388ff, #7c4dff);
      box-shadow: 0 4px 14px rgba(124, 77, 255, 0.4);
    }

    .btn-slow:hover {
      box-shadow: 0 6px 20px rgba(124, 77, 255, 0.5);
    }

    .btn-slow.speaking {
      background: linear-gradient(135deg, #7ed8f6, #3ab3e8);
      box-shadow: 0 4px 14px rgba(50, 150, 220, 0.45);
    }

    @keyframes bounce {
      from { transform: scale(1); }
      to   { transform: scale(1.3); }
    }

    /* Disable hover lift on touch devices */
    @media (hover: none) {
      .card:hover {
        transform: none;
        box-shadow: 0 8px 30px rgba(100, 60, 200, 0.15);
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      body {
        padding: 1.25rem 0.75rem 2rem;
      }

      .grid {
        gap: 1rem;
      }

      .card {
        padding: 1.2rem 1.1rem;
        border-radius: 18px;
        gap: 0.7rem;
      }

      .input-de,
      .input-es {
        font-size: 1rem; /* evita zoom automático en iOS Safari */
      }

      .btn-speak {
        font-size: 0.9rem;
        padding: 0.6rem 1rem;
      }

      .btn-row {
        gap: 0.4rem;
      }
    }

    /* Warning banner */
    .warning {
      display: none;
      background: #fff3cd;
      color: #856404;
      border: 2px solid #ffc107;
      border-radius: 16px;
      padding: 1rem 1.4rem;
      max-width: 960px;
      margin: 0 auto 1.5rem;
      font-weight: 700;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>

  <header>
    <h1>HablAleman</h1>
    <p>Escribe frases en alemán • Klick auf 🔊 y escucha</p>
  </header>

  <div class="warning" id="tts-warning">
    ⚠️ Tu navegador no admite síntesis de voz. Abre esta página en Chrome o Edge para escuchar el audio.
  </div>

  <div class="toolbar">
    <div class="phrase-counter">Frases: <span id="counter">0</span> / 10</div>
    <button class="btn-clear" id="btn-clear" onclick="clearAll()">🗑️ Limpiar todo</button>
  </div>

  <main class="grid" id="grid"></main>

  <footer>
    <p>Hecho con ❤️ para practicar alemán · 2026</p>
  </footer>

  <script>
    const MAX = 10;
    const STORAGE_KEY = 'hablaleman_phrases';

    const DEFAULTS = [
      { de: "Hallo! Wie geht es dir?",         es: "¡Hola! ¿Cómo estás?" },
      { de: "Guten Morgen!",                    es: "¡Buenos días!" },
      { de: "Guten Tag!",                       es: "¡Buenas tardes!" },
      { de: "Auf Wiedersehen!",                 es: "¡Hasta luego!" },
      { de: "Bitte.",                           es: "Por favor." },
      { de: "Danke schön!",                     es: "¡Muchas gracias!" },
      { de: "Entschuldigung!",                  es: "¡Disculpe!" },
      { de: "Ich verstehe das nicht.",          es: "No entiendo eso." },
      { de: "Wo ist die Toilette?",             es: "¿Dónde está el baño?" },
      { de: "Ich lerne Deutsch!",               es: "¡Estoy aprendiendo alemán!" },
    ];

    // --- Persistence ---
    function loadPhrases() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const saved = JSON.parse(raw);
          return saved.map((p, i) => {
            const def = DEFAULTS.find(d => d.de === p.de);
            return { de: p.de ?? '', es: p.es || def?.es || DEFAULTS[i]?.es || '' };
          });
        }
      } catch (_) {}
      return DEFAULTS.map(p => ({ ...p }));
    }

    function savePhrases() {
      const data = Array.from({ length: MAX }, (_, i) => ({
        de: document.getElementById(`de-${i}`)?.value ?? '',
        es: document.getElementById(`es-${i}`)?.value ?? '',
      }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      updateCounter();
    }

    function updateCounter() {
      let filled = 0;
      for (let i = 0; i < MAX; i++) {
        if ((document.getElementById(`de-${i}`)?.value ?? '').trim()) filled++;
      }
      document.getElementById('counter').textContent = filled;
    }

    // --- Auto-translate (MyMemory free API) ---
    function debounce(fn, ms) {
      let timer;
      return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
    }

    async function autoTranslate(text, esInput) {
      if (!text.trim()) { esInput.value = ''; savePhrases(); return; }
      try {
        const res  = await fetch('https://api.mymemory.translated.net/get?q=' +
                                 encodeURIComponent(text) + '&langpair=de|es');
        const data = await res.json();
        if (data.responseStatus === 200) {
          esInput.value = data.responseData.translatedText;
          savePhrases();
        }
      } catch (_) {}
    }

    // --- TTS (Hugging Face MMS German + Web Speech fallback) ---
    let activeAudio = null;
    let activeBtn   = null;

    const HF_TTS_URL = 'https://api-inference.huggingface.co/models/facebook/mms-tts-deu';

    // Warmup silencioso: el modelo HF tarda en arrancar la primera vez
    fetch(HF_TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ inputs: 'Hallo' })
    }).catch(() => {});

    async function speak(text, btn, rate = 1) {
      if (!text.trim()) return;

      if (activeBtn === btn) {
        if (activeAudio) { activeAudio.pause(); activeAudio.src = ''; activeAudio = null; }
        btn.classList.remove('speaking');
        activeBtn = null;
        return;
      }

      if (activeAudio) { activeAudio.pause(); activeAudio.src = ''; activeAudio = null; }
      if (activeBtn)   activeBtn.classList.remove('speaking');

      activeBtn = btn;
      btn.classList.add('speaking');

      try {
        const res = await fetch(HF_TTS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inputs: text })
        });
        if (!res.ok) throw new Error(res.status);

        const blob  = await res.blob();
        const url   = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.playbackRate = rate;
        activeAudio = audio;

        audio.onended = () => {
          btn.classList.remove('speaking');
          if (activeBtn === btn) { activeBtn = null; activeAudio = null; }
          URL.revokeObjectURL(url);
        };
        audio.onerror = () => {
          btn.classList.remove('speaking');
          if (activeBtn === btn) { activeBtn = null; activeAudio = null; }
        };
        await audio.play();

      } catch {
        // Fallback: Web Speech API
        if (!window.speechSynthesis) {
          btn.classList.remove('speaking');
          if (activeBtn === btn) activeBtn = null;
          return;
        }
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'de-DE';
        u.rate = rate;
        u.onend = u.onerror = () => {
          btn.classList.remove('speaking');
          if (activeBtn === btn) activeBtn = null;
        };
        window.speechSynthesis.speak(u);
      }
    }

    // --- Clear all ---
    function clearAll() {
      if (!confirm('¿Limpiar el texto de todas las frases?')) return;
      for (let i = 0; i < MAX; i++) {
        const deEl = document.getElementById(`de-${i}`);
        const esEl = document.getElementById(`es-${i}`);
        if (deEl) deEl.value = '';
        if (esEl) esEl.value = '';
      }
      savePhrases();
    }

    // --- Build grid ---
    function buildGrid(phrases) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      for (let i = 0; i < MAX; i++) {
        const { de = '', es = '' } = phrases[i] ?? {};

        const card = document.createElement('article');
        card.className = 'card';

        // Header with number badge
        const header = document.createElement('div');
        header.className = 'card-header';
        const badge = document.createElement('span');
        badge.className = 'card-num';
        badge.textContent = i + 1;
        header.appendChild(badge);
        card.appendChild(header);

        // German input
        const inputDe = document.createElement('input');
        inputDe.type = 'text';
        inputDe.className = 'input-de';
        inputDe.id = `de-${i}`;
        inputDe.value = de;
        inputDe.placeholder = 'Frase en alemán…';
        inputDe.setAttribute('aria-label', `Frase ${i + 1} en alemán`);
        const translateDebounced = debounce((text) => autoTranslate(text, inputEs), 800);
        inputDe.addEventListener('input', savePhrases);
        inputDe.addEventListener('input', () => translateDebounced(inputDe.value));
        card.appendChild(inputDe);

        // Buttons
        const btnRow = document.createElement('div');
        btnRow.className = 'btn-row';

        const btn = document.createElement('button');
        btn.className = 'btn-speak';
        btn.innerHTML = '<span class="icon-wave">🔊</span> Escuchar';
        if (!de.trim()) btn.disabled = true;
        btn.addEventListener('click', () => speak(document.getElementById(`de-${i}`).value, btn));

        const btnSlow = document.createElement('button');
        btnSlow.className = 'btn-speak btn-slow';
        btnSlow.innerHTML = '<span class="icon-wave">🐢</span> Lento';
        if (!de.trim()) btnSlow.disabled = true;
        btnSlow.addEventListener('click', () => speak(document.getElementById(`de-${i}`).value, btnSlow, 0.5));

        inputDe.addEventListener('input', () => {
          const hasText = !!inputDe.value.trim();
          btn.disabled = !hasText;
          btnSlow.disabled = !hasText;
        });

        btnRow.appendChild(btn);
        btnRow.appendChild(btnSlow);
        card.appendChild(btnRow);

        // Spanish input
        const inputEs = document.createElement('input');
        inputEs.type = 'text';
        inputEs.className = 'input-es';
        inputEs.id = `es-${i}`;
        inputEs.value = es;
        inputEs.placeholder = '🇪🇸 Traducción al español…';
        inputEs.setAttribute('aria-label', `Traducción ${i + 1} al español`);
        inputEs.readOnly = true;
        card.appendChild(inputEs);

        grid.appendChild(card);
      }

      updateCounter();
    }

    // --- Init ---
    buildGrid(loadPhrases());
  </script>
</body>
</html>
